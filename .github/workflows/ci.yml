name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # keytar builds against libsecret on Linux; install it before npm ci.
      - name: Install libsecret
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test
